services:
  mysql:
    image: mysql:8.0
    container_name: webtech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: mobile
    ports:
      - "3306:3306"
    volumes:
      - webtech_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  webtech_mysql_data:
